<div class="page-header">
  <h1>🐍 贪吃蛇</h1>
  <p>经典诺基亚风格，键盘方向键控制</p>
</div>

<div class="container">
  <div class="game-wrap">
    <div class="game-header">
      <h2>贪吃蛇</h2>
      <div class="score-box">
        <div class="label">分数</div>
        <div class="value" id="score">0</div>
        <div class="value hs" id="highScore"></div>
      </div>
    </div>
    <div class="game-actions">
      <button onclick="resetGame()">新游戏</button>
    </div>
    <canvas id="snakeCanvas" width="400" height="400"></canvas>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('snakeCanvas');
const ctx = canvas.getContext('2d');
const S = 20, COLS = 20, ROWS = 20;

let snake, food, dir, nextDir;
let score, highScore, state, stepTimer, animId, particles;

function resetGame() {
  if (stepTimer) { clearInterval(stepTimer); stepTimer = null; }
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; state = 'menu'; particles = [];
  highScore = parseInt(localStorage.getItem('snakeHS')) || 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('highScore').textContent = highScore > 0 ? '🏆 ' + highScore : '';
  document.getElementById('msg').textContent = '';
  placeFood();
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(render);
}

function placeFood() {
  let p;
  do { p = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s => s.x===p.x && s.y===p.y));
  food = p;
}

function startPlaying() {
  state = 'playing';
  stepTimer = setInterval(step, Math.max(60, 150 - Math.floor(score/5)*10));
}

function step() {
  dir = {x:nextDir.x, y:nextDir.y};
  const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    state = 'over'; clearInterval(stepTimer); stepTimer = null;
    if (score > highScore) { highScore=score; localStorage.setItem('snakeHS',highScore); document.getElementById('highScore').textContent='🏆 '+highScore; }
    return;
  }
  snake.unshift(head);
  if (head.x===food.x&&head.y===food.y) {
    score++; document.getElementById('score').textContent=score;
    spawnParticles(food.x,food.y);
    placeFood();
    clearInterval(stepTimer);
    stepTimer=setInterval(step,Math.max(60,150-Math.floor(score/5)*10));
  } else snake.pop();
}

function spawnParticles(gx,gy) {
  const cx=gx*S+S/2, cy=gy*S+S/2;
  for(let i=0;i<20;i++){
    const a=Math.random()*Math.PI*2, s=1+Math.random()*3;
    particles.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color:['#d4a96a','#6b8f71','#8baa8a','#fff'][Math.floor(Math.random()*4)],size:2+Math.random()*3});
  }
}

function render(t) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(30,45,36,0.05)'; ctx.lineWidth=0.5;
  for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*S,0);ctx.lineTo(i*S,canvas.height);ctx.stroke();}
  for(let i=0;i<=ROWS;i++){ctx.beginPath();ctx.moveTo(0,i*S);ctx.lineTo(canvas.width,i*S);ctx.stroke();}
  const pulse=1+Math.sin(t/180)*0.12;
  ctx.beginPath();ctx.arc(food.x*S+S/2,food.y*S+S/2,7*pulse,0,Math.PI*2);
  ctx.fillStyle='#d4a96a';ctx.fill();
  ctx.beginPath();ctx.arc(food.x*S+S/2-2,food.y*S+S/2-3,2.5*pulse,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fill();
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.06; p.life-=0.025;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  snake.forEach((seg,i)=>{
    const t=i/Math.max(snake.length-1,1);
    const r=Math.round(45+(107-45)*t), g=Math.round(90+(143-90)*t), b=Math.round(74+(113-74)*t);
    const rad=i===0?8:5;
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.beginPath();ctx.roundRect(seg.x*S+2,seg.y*S+2,S-4,S-4,rad);ctx.fill();
    if(i===0){
      const ex=seg.x*S+S/2, ey=seg.y*S+S/2;
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(ex-4,ey-3,3,0,Math.PI*2);ctx.arc(ex+4,ey-3,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#1e2d24';
      ctx.beginPath();ctx.arc(ex-4+dir.x*1.5,ey-3+dir.y*1.5,1.5,0,Math.PI*2);ctx.arc(ex+4+dir.x*1.5,ey-3+dir.y*1.5,1.5,0,Math.PI*2);ctx.fill();
    }
  });
  if(state==='menu'){
    ctx.fillStyle='rgba(30,45,36,0.06)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#3a6b4a';ctx.font='bold 28px system-ui';ctx.textAlign='center';
    ctx.fillText('🐍',canvas.width/2,canvas.height/2-30);
    ctx.font='bold 22px system-ui';ctx.fillText('贪吃蛇',canvas.width/2,canvas.height/2+10);
    ctx.font='14px system-ui';ctx.fillStyle='#6b8f71';
    ctx.fillText('按空格 / 方向键 开始',canvas.width/2,canvas.height/2+40);
  }
  if(state==='over'){
    ctx.fillStyle='rgba(30,45,36,0.55)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#fff';ctx.font='bold 26px system-ui';ctx.textAlign='center';
    ctx.fillText('游戏结束',canvas.width/2,canvas.height/2-25);
    ctx.font='20px system-ui';ctx.fillText('得分: '+score,canvas.width/2,canvas.height/2+15);
    if(score>=highScore&&score>0){ctx.fillStyle='#d4a96a';ctx.font='bold 15px system-ui';ctx.fillText('🏆 新纪录！',canvas.width/2,canvas.height/2+48);}
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='14px system-ui';
    ctx.fillText('按空格重新开始',canvas.width/2,canvas.height/2+80);
  }
  animId=requestAnimationFrame(render);
}

document.addEventListener('keydown',e=>{
  const k=e.key;
  if(k.startsWith('Arrow'))e.preventDefault();
  if(state==='menu'&&(k===' '||k.startsWith('Arrow'))){e.preventDefault();startPlaying();return;}
  if(state==='over'&&k===' '){e.preventDefault();resetGame();return;}
  if(state!=='playing')return;
  const map={'ArrowUp':{x:0,y:-1},'ArrowDown':{x:0,y:1},'ArrowLeft':{x:-1,y:0},'ArrowRight':{x:1,y:0}};
  if(k in map){const nd=map[k];if(nd.x!==-dir.x||nd.y!==-dir.y)nextDir=nd;}
});

canvas.addEventListener('click',()=>{
  if(state==='menu')startPlaying();
  else if(state==='over')resetGame();
});

let tx,ty;
canvas.addEventListener('touchstart',e=>{const t=e.touches[0];tx=t.clientX;ty=t.clientY;});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(state==='menu'&&(Math.abs(dx)>10||Math.abs(dy)>10)){startPlaying();return;}
  if(state!=='playing')return;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>20){const nd=dx>0?{x:1,y:0}:{x:-1,y:0};if(nd.x!==-dir.x||nd.y!==-dir.y)nextDir=nd;}
  else if(Math.abs(dy)>20){const nd=dy>0?{x:0,y:1}:{x:0,y:-1};if(nd.x!==-dir.x||nd.y!==-dir.y)nextDir=nd;}
});

resetGame();
</script>
