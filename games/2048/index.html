body { background: #f5f0ea; }
.game-wrap { max-width: 460px; margin: 0 auto; text-align: center; }
.game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.game-header h2 {
  font-size: 1.4rem; font-weight: 800;
  background: linear-gradient(135deg, #3a6b4a, #d4a96a);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.score-box { text-align: right; }
.score-box .label { font-size: 0.72rem; color: #8baa8a; letter-spacing: 0.05em; }
.score-box .value { font-size: 1.3rem; font-weight: 700; color: #3a6b4a; }
.game-actions { display: flex; gap: 8px; margin-bottom: 16px; }
.game-actions button {
  padding: 8px 18px; border-radius: 10px; border: 0.5px solid rgba(30,45,36,0.08);
  background: rgba(255,255,255,0.5); color: #3a6b4a; font-size: 0.85rem; font-weight: 600;
  cursor: pointer; transition: all 0.3s; backdrop-filter: blur(8px); font-family: inherit;
}
.game-actions button:hover { background: #3a6b4a; color: #fff; border-color: #3a6b4a; transform: translateY(-1px); }
#board {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  background: rgba(232,228,222,0.6); border-radius: 16px; padding: 8px;
  aspect-ratio: 1; width: 100%;
  border: 0.5px solid rgba(0,0,0,0.04);
}
.tile {
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 1.5rem; aspect-ratio: 1; width: 100%;
  background: rgba(255,255,255,0.45); color: #1e2d24;
  transition: all 0.1s;
}
.tile-2 { background: #eee4da; }
.tile-4 { background: #ede0c8; }
.tile-8 { background: #d4a96a; color: #fff; }
.tile-16 { background: #c99a5a; color: #fff; }
.tile-32 { background: #bf8a4a; color: #fff; }
.tile-64 { background: #b57a3a; color: #fff; }
.tile-128 { background: #6b8f71; color: #fff; font-size: 1.2rem; }
.tile-256 { background: #5a7f60; color: #fff; font-size: 1.2rem; }
.tile-512 { background: #4a6f50; color: #fff; font-size: 1.2rem; }
.tile-1024 { background: #3a5f40; color: #fff; font-size: 1rem; }
.tile-2048 { background: #2d5a4a; color: #fff; font-size: 1rem; }
.tile-super { background: #1e2d24; color: #fff; font-size: 0.9rem; }
.msg { text-align: center; margin-top: 16px; font-weight: 600; min-height: 1.5em; color: #3a6b4a; font-size: 0.9rem; }

  <div class="game-wrap">

      <h2>2048</h2>
      <div class="score-box"><div class="label">分数</div><div class="value" id="score">0</div></div>

<script>
let grid = [], score = 0, started = false;

function resetGame() {
  grid = Array(4).fill().map(() => Array(4).fill(0));
  score = 0; started = false;
  document.getElementById('msg').textContent = '按空格 / 方向键开始';
  document.getElementById('score').textContent = '0';
  render();
}

function addTile() {
  const empty = [];
  for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) if (!grid[r][c]) empty.push([r,c]);
  if (!empty.length) return;
  const [r,c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function slideRow(row) {
  let arr = row.filter(v => v);
  let newArr = [], i = 0;
  while (i < arr.length) {
    if (i + 1 < arr.length && arr[i] === arr[i+1]) {
      newArr.push(arr[i] * 2); score += arr[i] * 2; i += 2;
    } else { newArr.push(arr[i]); i++; }
  }
  while (newArr.length < 4) newArr.push(0);
  return newArr;
}

function move(d) {
  if (!started) {
    started = true; document.getElementById('msg').textContent = ''; addTile();
  }
  const old = JSON.stringify(grid);
  if (d === 0) for (let r = 0; r < 4; r++) grid[r] = slideRow(grid[r]);
  else if (d === 1) { for (let r = 0; r < 4; r++) { grid[r].reverse(); grid[r] = slideRow(grid[r]); grid[r].reverse(); } }
  else if (d === 2) { for (let c = 0; c < 4; c++) { const col = [grid[0][c],grid[1][c],grid[2][c],grid[3][c]]; const nc = slideRow(col); for (let r = 0; r < 4; r++) grid[r][c] = nc[r]; } }
  else if (d === 3) { for (let c = 0; c < 4; c++) { const col = [grid[3][c],grid[2][c],grid[1][c],grid[0][c]]; const nc = slideRow(col); for (let r = 0; r < 4; r++) grid[3-r][c] = nc[r]; } }
  if (JSON.stringify(grid) !== old) addTile();
  render();
  checkStatus();
}

function canMove() {
  for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) {
    if (!grid[r][c]) return true;
    if (c < 3 && grid[r][c] === grid[r][c+1]) return true;
    if (r < 3 && grid[r][c] === grid[r+1][c]) return true;
  }
  return false;
}

function checkStatus() {
  for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) {
    if (grid[r][c] === 2048) { document.getElementById('msg').textContent = '🎉 你赢了！'; return; }
  }
  if (!canMove()) document.getElementById('msg').textContent = '💀 游戏结束，得分: ' + score;
}

function render() {
  const board = document.getElementById('board'); board.innerHTML = '';
  document.getElementById('score').textContent = score;
  for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) {
    const val = grid[r][c];
    const div = document.createElement('div');
    div.className = 'tile' + (val ? ' tile-' + (val <= 2048 ? val : 'super') : '');
    div.textContent = val || '';
    board.appendChild(div);
  }
}

document.addEventListener('keydown', e => {
  const map = { ArrowLeft:0, ArrowRight:1, ArrowUp:2, ArrowDown:3 };
  if (e.key in map) { e.preventDefault(); move(map[e.key]); }
  if (e.key === ' ') { e.preventDefault(); move(0); }
});

let tx = 0, ty = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
  if (!started) { move(0); return; }
  if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 1 : 0);
  else move(dy > 0 ? 3 : 2);
});

resetGame();
</script>
