<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/jpeg" href="assets/avatar.jpg">
<link rel="apple-touch-icon" href="assets/avatar.jpg">
<title>tales 个人主页</title>
<link rel="stylesheet" href="assets/css/common.css">
<style>
  /* ===== Dark Mode Overrides (Home-Specific) ===== */
  body.dark #hero::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.5); pointer-events: none; z-index: 0; }
  body.dark #splash::before { background: rgba(10,10,12,0.65); }
  body.dark .music-player .ctrl-btn { color: #d0dce8; }
  body.dark .music-player .ctrl-btn:hover { color: #fff; }
  body.dark .track-select-btn { background: rgba(30,40,55,0.8); color: #c8d4e0; border-color: rgba(255,255,255,0.08); }
  body.dark .track-select-btn:hover { background: rgba(40,55,75,0.9); }
  body.dark .track-list { background: rgba(20,25,35,0.95); border-color: rgba(255,255,255,0.06); }
  body.dark .track-item { color: #b0c4d8; }
  body.dark .track-item:hover { background: rgba(40,55,75,0.5); color: #fff; }
  body.dark .track-item.active { background: rgba(60,80,110,0.4); color: #fff; }
  body.dark #playBtn, body.dark .play-main { background: var(--accent); color: #fff; }
  body.dark .ctrl-btn, body.dark .controls button { color: #c8d4e0; }
  body.dark .vol-btn { color: #c8d4e0; }
  body.dark .music-player .track-info .meta .artist { color: #90a0b0; }
  body.dark .music-player .controls button { background: rgba(40,55,75,0.4); color: #d0dce8; }
  body.dark .music-player .controls button:hover { background: rgba(60,80,110,0.5); }
  body.dark .music-player .controls .play-main { background: var(--accent); color: #fff; }
  body.dark .music-player .controls .progress-area .time { color: #90a0b0; }
  body.dark .vol-slider { background: rgba(20,28,40,0.95); border-color: rgba(255,255,255,0.06); }
  body.dark .vol-slider input[type="range"] { background: rgba(60,80,110,0.3); }
  body.dark .vol-slider input[type="range"]::-webkit-slider-thumb { background: var(--accent); }
  body.dark .clock-time { color: #e0e8f0; }
  body.dark .clock-date { color: #8899aa; }
  body.dark .hero-badges a, body.dark .hero-badges span { border-color: rgba(255,255,255,0.08); color: #c8d4e0; }
  body.dark .game-card { background: rgba(25,30,40,0.6); }
  body.dark .game-card .play-tag { background: rgba(60,80,110,0.2); color: #b0c4d8; }
  body.dark .game-card:hover .play-tag { background: var(--accent-dark); color: #fff; }
  body.dark .project-card { background: rgba(25,30,40,0.6); }
  body.dark .tagline { color: #8899aa; }
  body.dark .badge-gh, body.dark .badge-qq { background: rgba(0,0,0,0.4); color: #e0e8f4; }
  body.dark .bmb-wrap { background: rgba(20,25,35,0.75); border-color: rgba(255,255,255,0.06); }
  body.dark .bmb-btn { color: #b0c4d8; }
  body.dark .bmb-btn:hover { background: rgba(40,55,75,0.4); color: #fff; }
  body.dark .bmb-btn.bmb-play { background: var(--accent); color: #fff; }
  body.dark .bmb-btn.bmb-play:hover { background: var(--accent-light); }
  body.dark .bmb-name { color: #e0e8f4; }
  body.dark .bmb-time { color: #8899aa; }

  /* ===== Splash ===== */
  #splash {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    background: url(assets/bg.png) center/cover no-repeat fixed;
    transition: opacity 1s ease, visibility 1s ease;
  }
  #splash::before {
    content: ''; position: absolute; inset: 0;
    background: rgba(30, 45, 36, 0.55);
  }
  #splash.hide { opacity: 0; visibility: hidden; pointer-events: none; }
  .splash-card {
    position: relative; z-index: 1;
    max-width: 680px; width: 88%;
    padding: 48px 40px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    text-align: center;
    opacity: 0; transform: translateY(24px);
    animation: splashIn 1s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
    box-shadow: 0 24px 80px rgba(0,0,0,0.15);
  }
  @keyframes splashIn { to { opacity: 1; transform: translateY(0); } }
  .splash-card .icon {
    font-size: 2.4rem; margin-bottom: 20px;
    display: block;
  }
  .splash-card .quote-text {
    font-size: clamp(1.2rem, 2.8vw, 1.7rem);
    font-weight: 500;
    color: #fff;
    line-height: 1.8;
    letter-spacing: 0.02em;
  }
  .splash-card .quote-author {
    display: block; margin-top: 16px;
    font-size: 0.85rem; color: rgba(255,255,255,0.55);
    font-weight: 400;
  }
  .splash-bar {
    margin: 32px auto 0;
    width: 120px; height: 2px;
    border-radius: 1px;
    background: rgba(255,255,255,0.1);
    overflow: hidden;
  }
  .splash-bar .fill {
    height: 100%; width: 0;
    background: linear-gradient(90deg, var(--accent-lighter), #d4a96a);
    animation: barFill 3.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
  }
  @keyframes barFill { to { width: 100%; } }

  /* ===== Hero Section ===== */
  #hero {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    background: url(assets/bg.png) center/cover no-repeat fixed;
    padding: 100px 24px 80px;
  }
  /* overlay removed for cleaner look */
  .hero-content {
    position: relative; z-index: 1;
    width: 100%; max-width: 960px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    align-items: start;
  }

  /* Entrance animation */
  .hero-left, .hero-right {
    opacity: 0;
    transition: all 0.9s cubic-bezier(0.16,1,0.3,1);
  }
  .hero-left { transform: translateX(-50px); }
  .hero-right { transform: translateX(50px); }
  .hero-content.loaded .hero-left,
  .hero-content.loaded .hero-right {
    opacity: 1;
    transform: translateX(0);
  }

  .hero-left {
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
  }
  .hero-right {
    display: flex; flex-direction: column; align-items: center;
  }

  .hero-avatar-wrap {
    width: 120px; height: 120px;
    border-radius: 50%;
    padding: 3.5px;
    background: linear-gradient(135deg, var(--accent-light), #d4a96a, #c9a96e);
    box-shadow: 0 0 40px rgba(107, 143, 113, 0.2);
    margin-bottom: 24px;
    transition: transform 0.5s;
  }
  .hero-avatar-wrap:hover { transform: scale(1.06); }
  .hero-avatar-wrap img {
    width: 100%; height: 100%;
    border-radius: 50%; object-fit: cover;
  }
  .hero-left h1 {
    font-size: clamp(2.4rem, 5vw, 3.6rem);
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .hero-left .tagline {
    font-size: 1.1rem;
    color: var(--text-sec);
    margin-bottom: 32px;
    font-weight: 400;
  }
  .hero-badges {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  }
  .hero-badges a, .hero-badges span {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 20px;
    border-radius: 30px;
    font-size: 0.85rem; font-weight: 500;
    transition: all 0.3s;
  }
  .badge-gh {
    background: var(--text); color: var(--bg);
    box-shadow: 0 2px 12px var(--shadow);
  }
  .badge-gh:hover { transform: translateY(-2px); box-shadow: 0 4px 20px var(--shadow-strong); }
  .badge-qq {
    background: var(--text); color: var(--bg);
    box-shadow: 0 2px 12px var(--shadow);
  }
  .badge-qq:hover { transform: translateY(-2px); box-shadow: 0 4px 20px var(--shadow-strong); }
  .badge-outline {
    border: 1px solid rgba(30,45,36,0.12);
    color: #3a5a4a;
  }

  /* ===== Digital Clock ===== */
  .digital-clock {
    text-align: center;
    margin-bottom: 32px;
    padding: 16px 0;
  }
  .digital-clock .clock-time {
    font-size: clamp(2.8rem, 6vw, 4.2rem);
    font-weight: 300;
    font-variant-numeric: tabular-nums;
    color: var(--accent-dark);
    letter-spacing: 0.06em;
    line-height: 1.2;
    text-shadow: 0 2px 12px rgba(45,90,74,0.06);
  }
  .digital-clock .clock-date {
    font-size: 0.85rem;
    color: var(--text-light);
    margin-top: 4px;
    letter-spacing: 0.04em;
  }

  /* ===== Games ===== */
  #games { background: rgba(107,143,113,0.03); }
  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }
  .game-card {
    display: block;
    background: var(--card-bg-2);
    backdrop-filter: blur(12px);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    transition: all 0.3s;
    cursor: pointer;
  }
  .game-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 36px var(--border-soft);
  }
  .game-card .icon {
    font-size: 2.6rem;
    margin-bottom: 12px;
    display: block;
  }
  .game-card h3 {
    font-size: 1rem; font-weight: 700;
    color: var(--text); margin-bottom: 6px;
  }
  .game-card p {
    font-size: 0.8rem; color: var(--text-lighter);
    margin-bottom: 14px;
  }
  .game-card .play-tag {
    display: inline-block;
    padding: 4px 16px;
    border-radius: 100px;
    font-size: 0.72rem; font-weight: 600;
    background: rgba(45,90,74,0.08);
    color: var(--accent-dark);
    transition: all 0.3s;
  }
  .game-card:hover .play-tag {
    background: var(--accent-dark);
    color: #fff;
  }

  /* ===== Music Player ===== */
  .music-player {
    width: 100%; max-width: 480px;
    padding: 20px 24px;
    background: var(--card-bg-2);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border: 0.5px solid var(--card-bg);
    border-radius: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.02);
  }
  .music-player .track-info {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 14px;
  }
  .music-player .track-info .cover {
    width: 42px; height: 42px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent-light), var(--accent-lighter));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; flex-shrink: 0;
  }
  .music-player .track-info .meta { flex: 1; min-width: 0; }
  .music-player .track-info .meta .name {
    font-size: 0.9rem; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .music-player .track-info .meta .artist {
    font-size: 0.75rem; color: var(--text-lighter);
  }
  .music-player .controls {
    display: flex; align-items: center; gap: 12px;
  }
  .music-player .controls button {
    width: 36px; height: 36px; border-radius: 50%;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; transition: all 0.2s;
    background: var(--border-strong);
    color: var(--accent-dark);
    flex-shrink: 0;
  }
  .music-player .controls button:hover {
    background: rgba(30,45,36,0.12);
    transform: scale(1.05);
  }
  .music-player .controls button.play-main {
    width: 42px; height: 42px;
    background: var(--accent-dark); color: #fff;
    font-size: 1rem;
  }
  .music-player .controls button.play-main:hover {
    background: var(--accent); transform: scale(1.06);
  }
  .music-player .controls .progress-area {
    flex: 1; display: flex; align-items: center; gap: 8px;
  }
  .music-player .controls .track-select-btn {
    width: 30px; height: 30px; font-size: 0.8rem;
    background: var(--border-strong); color: var(--accent-dark);
  }
  .music-player .controls .track-select-btn:hover {
    background: rgba(30,45,36,0.12); transform: scale(1.05);
  }
  .music-player .controls .progress-area .time {
    font-size: 0.7rem; color: var(--text-light);
    font-variant-numeric: tabular-nums;
    min-width: 32px;
  }
  .music-player .controls .progress-area .bar-wrap {
    flex: 1; height: 3px; border-radius: 2px;
    background: var(--border-strong);
    cursor: pointer; position: relative;
  }
  .music-player .controls .progress-area .bar-wrap .fill {
    height: 100%; width: 0;
    background: linear-gradient(90deg, var(--accent-light), #d4a96a);
    border-radius: 2px;
    transition: width 0.1s linear;
  }
  .vol-wrap {
    position: relative; display: flex; align-items: center;
  }
  .vol-wrap .vol-btn {
    font-size: 0.85rem; width: 30px; height: 30px;
    border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    background: var(--border-strong); color: var(--accent-dark);
    flex-shrink: 0;
  }
  .vol-wrap .vol-btn:hover { background: rgba(30,45,36,0.12); transform: scale(1.05); }
  .vol-slider {
    position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
    width: 32px; height: 100px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(12px);
    border: 0.5px solid rgba(0,0,0,0.06);
    border-radius: 16px;
    display: none;
    align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    padding: 8px 0;
  }
  .vol-slider.show { display: flex; }
  .vol-slider input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 80px; height: 3px;
    border-radius: 2px;
    background: rgba(30,45,36,0.08);
    outline: none;
    transform: rotate(-90deg);
  }
  .vol-slider input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent-dark);
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .vol-slider input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent-dark);
    cursor: pointer;
    border: none;
  }

  /* ===== Track Selector ===== */
  .track-info { cursor: pointer; position: relative; }
  .track-list {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.06);
    overflow: hidden;
    display: none; z-index: 10;
  }
  .track-list.show { display: block; }
  .track-list .item {
    padding: 10px 14px; font-size: 0.82rem;
    transition: background 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .track-list .item:hover { background: rgba(107,143,113,0.06); }
  .track-list .item .idx {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; font-weight: 700;
    background: rgba(107,143,113,0.1); color: var(--accent); flex-shrink: 0;
  }
  .track-list .item.active .idx { background: var(--accent-dark); color: #fff; }
  .track-list .item .info { flex: 1; min-width: 0; }
  .track-list .item .info .tname { font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-list .item .info .tartist { font-size: 0.72rem; color: var(--text-footer); }
  .track-list .item .check { color: var(--accent-dark); font-size: 0.75rem; opacity: 0; }
  .track-list .item.active .check { opacity: 1; }

  /* ===== Section Common ===== */
  section { padding: 100px 24px; }
  #sub-view section { padding: 0; }
  .section-inner { max-width: 1000px; margin: 0 auto; }
  .section-label {
    display: inline-block;
    font-size: 0.75rem; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent-lighter); margin-bottom: 8px;
  }
  .section-title {
    font-size: clamp(1.6rem, 3.5vw, 2.2rem);
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--text);
  }
  .section-desc {
    color: var(--text-sec);
    max-width: 520px;
    margin-bottom: 48px;
    font-size: 0.95rem;
  }

  /* ===== Section Divider ===== */
  .section-divider {
    border: none;
    height: 0.5px;
    background: var(--border);
    margin: 0;
  }

  /* ===== Projects ===== */
  #projects { background: var(--bg); }
  .project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  .project-card {
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .project-card .links { margin-top: auto; }
  .project-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent-light), #d4a96a);
    opacity: 0; transition: opacity 0.4s;
  }
  .project-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 16px 48px var(--border-strong);
  }
  .project-card:hover::before { opacity: 1; }

  .project-card .card-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
  }
  .project-card .card-header .icon {
    font-size: 1.6rem;
    display: block;
    flex-shrink: 0;
  }
  .project-card .card-header h3 {
    font-size: 1.1rem; font-weight: 700;
    color: var(--text);
  }
  .project-card .tags {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
  }
  .project-card .tags span {
    padding: 2px 10px; border-radius: 100px;
    font-size: 0.7rem; font-weight: 500;
    background: var(--tag-bg);
    color: var(--accent);
  }
  .project-card p {
    font-size: 0.85rem; color: var(--text-lighter);
    margin-bottom: 16px; line-height: 1.6;
  }
  .project-card .links {
    display: flex; gap: 16px;
  }
  .project-card .links a {
    font-size: 0.8rem; font-weight: 600;
    color: var(--accent); transition: color 0.3s;
  }
  .project-card .links a:hover { color: #d4a96a; }
  .project-card.placeholder { opacity: 0.5; cursor: default; }
  .project-card.placeholder:hover {
    transform: none; box-shadow: none;
  }
  .project-card.placeholder::before { display: none; }
  .project-card.placeholder .plus-icon {
    font-size: 2.4rem; margin-bottom: 12px; display: block;
    color: var(--accent-lighter);
  }

  /* ===== Bottom Music Bar ===== */
.bmb-wrap {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 200;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(28px) saturate(1.6);
  -webkit-backdrop-filter: blur(28px) saturate(1.6);
  border: 0.5px solid rgba(0,0,0,0.06);
  border-radius: 50px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.04);
  padding: 10px 28px;
  transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  opacity: 0; transform: translateX(-50%) translateY(24px);
  pointer-events: none;
}
.bmb-wrap.show {
  opacity: 1; transform: translateX(-50%) translateY(0);
  pointer-events: auto;
}
/* Collapsed state: thin progress bar */
.bmb-wrap.collapsed {
  padding: 0;
  border-radius: 4px;
  width: 280px;
  height: 8px;
  background: linear-gradient(90deg, rgba(107,143,113,0.3), rgba(212,169,106,0.3), rgba(107,143,113,0.3));
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.bmb-wrap.collapsed .bmb-inner { opacity: 0; visibility: hidden; }
.bmb-wrap.collapsed .bmb-progress {
  position: absolute; top: 0; left: 0; height: 100%;
  background: linear-gradient(90deg, var(--accent), #d4a96a, var(--accent-light));
  border-radius: 4px;
  width: 0%;
  transition: width 0.3s linear;
}
/* Expanded state: full controls */
.bmb-wrap.expanded {
  padding: 12px 32px;
  box-shadow: 0 8px 36px rgba(0,0,0,0.08);
}
.bmb-wrap.expanded .bmb-inner { opacity: 1; }
.bmb-wrap.expanded .bmb-progress { display: none; }
.bmb-inner {
  display: flex; align-items: center; gap: 20px;
  transition: opacity 0.25s;
}
.bmb-progress {
  display: none;
}
.bmb-left {
  display: flex; align-items: center; gap: 10px;
}
.bmb-icon { font-size: 1.1rem; }
.bmb-name {
  font-size: 0.85rem; font-weight: 500;
  color: var(--text);
  max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.bmb-right {
  display: flex; align-items: center; gap: 6px;
}
.bmb-btn {
  background: none; border: none; cursor: pointer;
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; color: var(--text-sec);

}

.bmb-btn.bmb-play {

<script>
  // ===== Splash Quotes & Music Player (config-driven) =====
  // 主题切换、滚动显现、SPA 导航已移到 assets/js/*.js
  // 开机语录和音乐播放器从 config/*.json 异步加载
  SiteConfig.ready().then(function(cfg) {
    // 初始化语录
    var quotes = cfg.quotes;
    var q = quotes[Math.floor(Math.random() * quotes.length)];
    document.getElementById('splashQuote').innerHTML = q.o ? '「' + q.o + '」<br>&emsp;' + q.t : '「' + q.t + '」';
    document.getElementById('splashAuthor').textContent = q.a;
    setTimeout(function() {
      document.getElementById('splash').classList.add('hide');
      document.getElementById('heroContent').classList.add('loaded');
      sessionStorage.setItem('splashShown', '1');
    }, 3600);

    // 初始化音乐播放器
    initMusicPlayer(cfg.music);
  }).catch(function(err) {
    console.error('Failed to load site config:', err);
    // 即使配置加载失败也隐藏 splash，避免卡住
    setTimeout(function() {
      document.getElementById('splash').classList.add('hide');
      document.getElementById('heroContent').classList.add('loaded');
    }, 3600);
  });

  // ===== Digital Clock =====
  (function() {
    const clockTime = document.querySelector('.clock-time');
    const clockDate = document.querySelector('.clock-date');
    const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      clockTime.textContent = h + ':' + m + ':' + s;
      clockDate.textContent = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 ' + weekDays[now.getDay()];
    }
    updateClock();
    setInterval(updateClock, 1000);
  })();

  // ===== Music Player =====
  function initMusicPlayer(tracks) {
    let currentTrack = 0;
    let isPlaying = false;
    const audio = new Audio();
    audio.volume = 0.5;

    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const trackName = document.getElementById('trackName');
    const trackArtist = document.getElementById('trackArtist');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');
    const progressFill = document.getElementById('progressFill');
    const progressBar = document.getElementById('progressBar');
    const volBtn = document.getElementById('volBtn');
    const volSlider = document.getElementById('volSlider');
    const volRange = document.getElementById('volRange');
    const trackList = document.getElementById('trackList');
    const trackInfo = document.getElementById('trackInfo');
    const trackSelectBtn = document.getElementById('trackSelectBtn');

    function loadTrack(idx) {
      const t = tracks[idx];
      audio.src = SiteConfig.absUrl(t.src);
      trackName.textContent = t.name;
      trackArtist.textContent = t.artist;
      audio.load();
      if (isPlaying) {
        audio.play().catch(() => { isPlaying = false; playBtn.textContent = '▶'; });
      }
      updatePlayBtn();
      renderTrackList();
    }

    function updatePlayBtn() {
      playBtn.textContent = isPlaying ? '⏸' : '▶';
    }

    function togglePlay() {
      if (isPlaying) {
        audio.pause();
      } else {
        audio.play().catch(() => {});
      }
      isPlaying = !isPlaying;
      updatePlayBtn();
    }

    function nextTrack() {
      currentTrack = (currentTrack + 1) % tracks.length;
      loadTrack(currentTrack);
    }

    function prevTrack() {
      currentTrack = (currentTrack - 1 + tracks.length) % tracks.length;
      loadTrack(currentTrack);
    }

    function selectTrack(idx) {
      if (idx === currentTrack && isPlaying) return;
      currentTrack = idx;
      loadTrack(currentTrack);
      if (!isPlaying) { isPlaying = true; audio.play().catch(() => {}); updatePlayBtn(); }
      closeTrackList();
    }

    function formatTime(s) {
      if (isNaN(s) || !isFinite(s)) return '0:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return m + ':' + String(sec).padStart(2, '0');
    }

    function renderTrackList() {
      trackList.innerHTML = '';
      tracks.forEach((t, i) => {
        const div = document.createElement('div');
        div.className = 'item' + (i === currentTrack ? ' active' : '');
        div.innerHTML = '<span class="idx">' + (i + 1) + '</span><div class="info"><div class="tname">' + t.name + '</div><div class="tartist">' + t.artist + '</div></div><span class="check">✓</span>';
        div.addEventListener('click', (e) => { e.stopPropagation(); selectTrack(i); });
        trackList.appendChild(div);
      });
    }

    function toggleTrackList(e) {
      e.stopPropagation();
      trackList.classList.toggle('show');
      volSlider.classList.remove('show');
    }

    function closeTrackList() {
      trackList.classList.remove('show');
    }

    audio.addEventListener('loadedmetadata', () => {
      totalTimeEl.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        const pct = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = pct + '%';
        currentTimeEl.textContent = formatTime(audio.currentTime);
      }
    });

    audio.addEventListener('ended', () => {
      nextTrack();
    });

    progressBar.addEventListener('click', (e) => {
      if (!audio.duration) return;
      const rect = progressBar.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      audio.currentTime = pct * audio.duration;
    });

    playBtn.addEventListener('click', togglePlay);
    nextBtn.addEventListener('click', () => { closeTrackList(); nextTrack(); });
    prevBtn.addEventListener('click', () => { closeTrackList(); prevTrack(); });
    trackSelectBtn.addEventListener('click', toggleTrackList);
    trackInfo.addEventListener('click', (e) => {
      if (!e.target.closest('.track-list') && !e.target.closest('.cover')) {
        toggleTrackList(e);
      }
    });

    let volHoverTimer = null;
    volBtn.addEventListener('mouseenter', () => {
      clearTimeout(volHoverTimer);
      volSlider.classList.add('show');
    });
    volSlider.addEventListener('mouseenter', () => {
      clearTimeout(volHoverTimer);
    });
    volBtn.addEventListener('mouseleave', () => {
      volHoverTimer = setTimeout(() => volSlider.classList.remove('show'), 300);
    });
    volSlider.addEventListener('mouseleave', () => {
      volHoverTimer = setTimeout(() => volSlider.classList.remove('show'), 300);
    });

    volRange.addEventListener('input', () => {
      const v = parseFloat(volRange.value);
      audio.volume = v;
      volBtn.textContent = v === 0 ? '🔇' : v < 0.3 ? '🔈' : v < 0.7 ? '🔉' : '🔊';
    });

    let volMuted = false;
    let prevVol = 0.5;
    volBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      volMuted = !volMuted;
      if (volMuted) {
        prevVol = audio.volume;
        audio.volume = 0;
        volRange.value = 0;
        volBtn.textContent = '🔇';
      } else {
        audio.volume = prevVol;
        volRange.value = prevVol;
        volBtn.textContent = prevVol === 0 ? '🔇' : prevVol < 0.3 ? '🔈' : prevVol < 0.7 ? '🔉' : '🔊';
      }
    });

    audio.addEventListener('volumechange', () => {
      volRange.value = audio.volume;
      if (audio.volume === 0) volBtn.textContent = '🔇';
      else if (audio.volume < 0.3) volBtn.textContent = '🔈';
      else if (audio.volume < 0.7) volBtn.textContent = '🔉';
      else volBtn.textContent = '🔊';
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.track-info')) closeTrackList();
      if (!e.target.closest('.vol-wrap')) volSlider.classList.remove('show');
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === ' ' && e.target === document.body) {
        e.preventDefault();
        togglePlay();
      }
    });

    renderTrackList();
    loadTrack(0);

    // Expose music API globally
    window.__musicToggle = togglePlay;
    window.__musicPrev = prevTrack;
    window.__musicNext = nextTrack;
    window.__musicSelect = selectTrack;

    // Bottom bar update
    function updateBottomBar() {
      var bar = document.getElementById("bottomMusicBar");
      var btn = document.getElementById("bmbPlayBtn");
      var nameEl = document.getElementById("bmbTrackName");
      var timeEl = document.getElementById("bmbTime");
      var progEl = document.getElementById("bmbProgress");
      if (btn) btn.textContent = isPlaying ? "\u23f8" : "\u25b6";
      if (nameEl && tracks[currentTrack]) nameEl.textContent = tracks[currentTrack].name;
      if (timeEl) timeEl.textContent = formatTime(audio.currentTime) + " / " + formatTime(audio.duration);
      if (progEl && audio.duration) {
        progEl.style.width = (audio.currentTime / audio.duration * 100) + '%';
      }
      if (bar) bar.classList.add("show");
    }
    // Collapse/expand logic
    (function() {
      var bar = document.getElementById("bottomMusicBar");
      var collapseTimer = null;
      function collapseBar() {
        bar.classList.add("collapsed");
        bar.classList.remove("expanded");
      }
      function expandBar() {
        bar.classList.add("expanded");
        bar.classList.remove("collapsed");
      }
      bar.addEventListener("mouseenter", function() {
        if (collapseTimer) { clearTimeout(collapseTimer); collapseTimer = null; }
        expandBar();
      });
      bar.addEventListener("mouseleave", function() {
        if (collapseTimer) clearTimeout(collapseTimer);
        collapseTimer = setTimeout(collapseBar, 1000);
      });
      // Start collapsed
      collapseTimer = setTimeout(collapseBar, 1000);
    })();
    document.getElementById("bmbPlayBtn").addEventListener("click", togglePlay);
    document.getElementById("bmbPrevBtn").addEventListener("click", function() { closeTrackList(); prevTrack(); });
    document.getElementById("bmbNextBtn").addEventListener("click", function() { closeTrackList(); nextTrack(); });
    audio.addEventListener("timeupdate", updateBottomBar);
    audio.addEventListener("loadedmetadata", updateBottomBar);
    // Patch updatePlayBtn to also update bottom bar
    var origUpdate = updatePlayBtn;
    updatePlayBtn = function() {
      origUpdate();
      updateBottomBar();
    };
    updateBottomBar();
  }
</script>
