<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="apple-touch-icon" href="/assets/avatar.jpg">
<title>关于我 · tales</title>
<link rel="stylesheet" href="assets/css/common.css">
<style>
  /* ===== Video Background ===== */
  html { min-height: 100%; }
  body { min-height: 100%; background: transparent !important; }
  .video-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; overflow: hidden;
  }
  .video-bg video {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .video-bg::after {
    content: '';
    position: absolute; inset: 0;
    background: transparent;
    pointer-events: none;
    transition: background 0.3s;
  }
  body.dark .video-bg::after {
    background: rgba(12,12,14,0.6);
  }

  /* ===== Content Wrap ===== */
  .content-wrap {
    position: relative; z-index: 1;
    max-width: 800px; margin: 0 auto;
    padding: 100px 24px 60px;
  }

  /* ===== About Hero ===== */
  .about-hero {
    text-align: center;
    padding: 16px 0 16px;
  }
  .about-avatar {
    width: 140px; height: 140px;
    border-radius: 50%;
    padding: 4px;
    background: linear-gradient(135deg, var(--accent-light), #d4a96a, #c9a96e);
    box-shadow: 0 0 50px rgba(107, 143, 113, 0.25);
    margin: 0 auto 20px;
  }
  .about-avatar img {
    width: 100%; height: 100%;
    border-radius: 50%; object-fit: cover;
  }
  .about-name {
    font-size: 2.2rem; font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .about-tagline {
    font-size: 1rem;
    color: var(--text-sec);
    margin-bottom: 6px;
  }

  /* ===== Info Grid - Fixed Equal Size ===== */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .info-card {
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100px;
    transition: all 0.3s;
  }
  .info-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px var(--shadow);
    border-color: var(--accent-light);
  }
  .info-card .info-icon {
    font-size: 1.6rem;
    margin-bottom: 8px;
  }
  .info-card .info-label {
    font-size: 0.72rem;
    color: var(--text-light);
    margin-bottom: 4px;
  }
  .info-card .info-value {
    font-size: 0.95rem; font-weight: 600;
    color: var(--text);
  }

  /* ===== Game Tags ===== */
  .game-section {
    margin-bottom: 20px;
  }
  .game-subtitle {
    font-size: 0.8rem;
    color: var(--accent-lighter);
    margin-bottom: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .tag-list {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 16px;
  }
  .tag-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 12px;
    border-radius: 100px;
    font-size: 0.82rem; font-weight: 500;
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 0.5px solid var(--border);
    color: var(--accent);
    transition: all 0.3s;
  }
  .tag-pill:hover {
    background: var(--accent-dark);
    color: #fff;
    border-color: var(--accent-dark);
    transform: translateY(-2px);
  }
  .tag-pill .tag-emoji { font-size: 0.9rem; }

  /* ===== Group Title ===== */
  .group-title {
    display: flex; align-items: center; gap: 10px;
    font-size: 1.05rem; font-weight: 700;
    color: var(--text);
    margin: 28px 0 12px;
    padding-left: 4px;
  }
  .group-title .gt-icon { font-size: 1.2rem; }
  .group-title::before {
    content: '';
    width: 3px; height: 18px;
    background: linear-gradient(180deg, var(--accent-light), #d4a96a);
    border-radius: 2px;
  }

  /* ===== Contact - Mini Inline ===== */
  .contact-mini {
    display: flex; flex-wrap: wrap; gap: 10px;
    align-items: center;
  }
  .contact-mini-item {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    border-radius: 100px;
    background: var(--card-bg);
    backdrop-filter: blur(8px);
    border: 0.5px solid var(--border);
    font-size: 0.82rem; font-weight: 500;
    color: var(--text);
    transition: all 0.3s;
    cursor: pointer;
  }
  .contact-mini-item:hover {
    background: var(--accent-dark);
    color: #fff;
    border-color: var(--accent-dark);
    transform: translateY(-2px);
  }
  .contact-mini-item .cm-icon {
    font-size: 1rem;
  }

  /* ===== Responsive ===== */
  @media (max-width: 640px) {
    .info-grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .about-avatar { width: 110px; height: 110px; }
    .about-name { font-size: 1.8rem; }
  }
</style>
</head>
